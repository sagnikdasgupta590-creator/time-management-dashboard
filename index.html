<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Time Management Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">⏱ Smart Time Management Dashboard</h2>

  <div class="card p-4 shadow-sm">

    <!-- INPUT SECTION -->
    <input type="number" id="study" class="form-control mb-2" placeholder="Study hours">

    <input type="number" id="sleep" class="form-control mb-2" placeholder="Sleep hours">

    <input type="number" id="entertainment" class="form-control mb-3" placeholder="Entertainment hours">

    <button onclick="loadData()" class="btn btn-primary mb-3">Analyze</button>

    <div id="output"></div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
